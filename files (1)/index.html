<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FX ロット計算ツール</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FX Lot">
<meta name="theme-color" content="#080b10">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #080b10;
  --bg2:       #0e1219;
  --bg3:       #141820;
  --border:    #1e2535;
  --border2:   #2a3347;
  --text:      #c8d8f0;
  --muted:     #4a5a75;
  --muted2:    #6a7a95;
  --accent:    #00e5ff;
  --accent2:   #0097b2;
  --green:     #00e676;
  --green2:    #00a152;
  --orange:    #ff9100;
  --red:       #ff1744;
  --gold:      #ffd740;
  --r: 14px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Background grid ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% -10%, rgba(0,229,255,.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 90% 90%, rgba(0,230,118,.05) 0%, transparent 55%);
  pointer-events: none;
}

/* ── Layout ── */
.page {
  position: relative; z-index: 1;
  max-width: 740px;
  margin: 0 auto;
  padding: 40px 20px 80px;
  padding-left: max(20px, env(safe-area-inset-left));
  padding-right: max(20px, env(safe-area-inset-right));
  padding-bottom: max(80px, calc(env(safe-area-inset-bottom) + 40px));
}

/* ── Header ── */
header {
  margin-bottom: 40px;
}
.header-top {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 8px;
}
.header-icon {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, var(--accent), var(--green));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  box-shadow: 0 0 20px rgba(0,229,255,.3);
}
.header-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: .2em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 3px;
}
header h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(22px, 5vw, 32px);
  font-weight: 800;
  color: #fff;
  letter-spacing: -.5px;
}
header .sub {
  font-size: 13px;
  color: var(--muted2);
  margin-top: 6px;
  font-weight: 300;
}

/* ── Section title ── */
.section-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Card ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 24px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,229,255,.2), transparent);
}

/* ── Input group ── */
.inputs-col {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.field {
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.field label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted2);
  font-family: 'JetBrains Mono', monospace;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.field label .hint {
  font-size: 9px;
  color: var(--muted);
  text-transform: none;
  letter-spacing: 0;
}
.input-row {
  display: flex;
  align-items: center;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color .18s, box-shadow .18s;
}
.input-row:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,229,255,.1);
}
.input-row input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  padding: 13px 14px;
  font-size: 18px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  color: #fff;
  -webkit-appearance: none;
  appearance: none;
  min-width: 0;
}
.input-row input::-webkit-inner-spin-button,
.input-row input::-webkit-outer-spin-button { -webkit-appearance: none; }
.input-unit {
  padding: 0 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  border-left: 1px solid var(--border);
  white-space: nowrap;
}

/* ── Pair select dropdown ── */
.pair-select-wrap {
  position: relative;
}
.pair-select-wrap::after {
  content: '▾';
  position: absolute;
  right: 16px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted2);
  font-size: 14px;
  pointer-events: none;
}
select#pairSelect {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 40px 13px 16px;
  font-size: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  color: var(--accent);
  outline: none;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  transition: border-color .18s, box-shadow .18s;
}
select#pairSelect:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,229,255,.1);
}
select#pairSelect option {
  background: var(--bg2);
  color: var(--text);
  font-size: 14px;
}

/* ── Rate override row ── */
.rate-override-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}
.rate-override-row .input-row {
  flex: 1;
}
.rate-override-row .reset-btn {
  flex-shrink: 0;
  padding: 0 14px;
  height: 48px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--muted2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  transition: border-color .18s, color .18s;
  white-space: nowrap;
}
.rate-override-row .reset-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ── Calc button ── */
.calc-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #00c8e0, #00e676);
  border: none;
  border-radius: 12px;
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: #040810;
  letter-spacing: .05em;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s, filter .15s;
  position: relative;
  overflow: hidden;
  margin-top: 4px;
}
.calc-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.2), transparent);
  opacity: 0;
  transition: opacity .15s;
}
.calc-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0,229,255,.35);
  filter: brightness(1.05);
}
.calc-btn:hover::before { opacity: 1; }
.calc-btn:active { transform: translateY(0); }

/* ── Result ── */
.result-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  margin-bottom: 20px;
  display: none;
  animation: fadeUp .35s ease both;
}
.result-card.show { display: block; }

@keyframes fadeUp {
  from { opacity:0; transform: translateY(16px); }
  to   { opacity:1; transform: translateY(0); }
}

.result-header {
  background: linear-gradient(135deg, rgba(0,229,255,.07), rgba(0,230,118,.05));
  border-bottom: 1px solid var(--border);
  padding: 20px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.result-header-left .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 4px;
}
.lot-display {
  font-family: 'Syne', sans-serif;
  font-size: clamp(36px, 10vw, 56px);
  font-weight: 800;
  line-height: 1;
  color: var(--accent);
  text-shadow: 0 0 30px rgba(0,229,255,.4);
}
.lot-unit {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--muted2);
  margin-left: 6px;
}
.lot-units-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
}
.risk-badge {
  padding: 8px 16px;
  border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .08em;
  text-align: center;
}
.risk-badge .rb-label { font-size: 9px; font-weight: 400; opacity: .7; margin-bottom: 3px; }
.risk-badge .rb-val   { font-size: 20px; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 1px;
  background: var(--border);
}
.stat-cell {
  background: var(--bg2);
  padding: 18px 20px;
  text-align: center;
}
.stat-cell .sc-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.stat-cell .sc-val {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
}
.stat-cell .sc-val.green { color: var(--green); }
.stat-cell .sc-val.red   { color: var(--red);   }
.stat-cell .sc-val.gold  { color: var(--gold);  }
.stat-cell .sc-val.cyan  { color: var(--accent);}

/* warning */
.warning-box {
  display: none;
  margin: 0 24px 20px;
  padding: 12px 14px;
  background: rgba(255,23,68,.08);
  border: 1px solid rgba(255,23,68,.3);
  border-radius: 10px;
  font-size: 12px;
  color: #ff7597;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.warning-box.show { display: flex; }
.warning-box .wi { font-size: 14px; flex-shrink: 0; }

/* ── Tip box ── */
.tip-box {
  background: rgba(0,229,255,.04);
  border: 1px solid rgba(0,229,255,.1);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 12px;
  color: var(--muted2);
  line-height: 1.7;
  margin-top: 4px;
}
.tip-box strong { color: var(--accent); font-family: 'JetBrains Mono', monospace; }

/* ── Rate badge ── */
.rate-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  padding: 6px 12px;
  background: rgba(0,229,255,.06);
  border: 1px solid rgba(0,229,255,.15);
  border-radius: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted2);
}
.rate-badge .rb-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
  transition: background .3s;
}
.rate-badge .rb-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
.rate-badge .rb-dot.fallback { background: var(--orange); }
.rate-badge .rb-val { color: var(--accent); font-weight: 700; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: .4; }
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

@media (max-width: 480px) {
  .page { padding: 24px 14px 60px; }
  .card { padding: 18px 16px; }
  .pair-grid { grid-template-columns: repeat(3, 1fr); }
  .result-header { padding: 16px 18px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <header>
    <div class="header-top">
      <div class="header-icon">⚡</div>
      <div>
        <div class="header-label">FX Risk Manager</div>
        <h1>ロット計算ツール</h1>
      </div>
    </div>
    <p class="sub">資金・リスク・損切り幅から最適なロット数を即座に算出します</p>
  </header>

  <!-- STEP 1: Currency Pair -->
  <div class="section-title">Step 01 &nbsp;通貨ペアを選択</div>
  <div class="card" style="margin-bottom:20px;">
    <div class="field">
      <label>通貨ペア</label>
      <div class="pair-select-wrap">
        <select id="pairSelect"></select>
      </div>
    </div>
  </div>

  <!-- STEP 2: Parameters -->
  <div class="section-title">Step 02 &nbsp;パラメータを入力</div>
  <div class="card">
    <div class="inputs-col">

      <!-- 資金 -->
      <div class="field">
        <label>
          口座残高（資金）
          <span class="hint">取引に使える資金総額</span>
        </label>
        <div class="input-row">
          <input type="number" id="balance" value="500000" min="1" step="1000" placeholder="500000">
          <span class="input-unit">JPY</span>
        </div>
      </div>

      <!-- リスク% -->
      <div class="field">
        <label>
          1トレードあたりのリスク
          <span class="hint">資金の何%まで許容するか</span>
        </label>
        <div class="input-row">
          <input type="number" id="risk" value="2" min="0.1" max="100" step="0.1" placeholder="2">
          <span class="input-unit">%</span>
        </div>
      </div>

      <!-- 損切り幅 -->
      <div class="field">
        <label>
          損切り幅
          <span class="hint">エントリーから損切りまでの距離</span>
        </label>
        <div class="input-row">
          <input type="number" id="sl" value="30" min="1" step="1" placeholder="30">
          <span class="input-unit">pips</span>
        </div>
      </div>

      <!-- USD/JPY 手動上書き -->
      <div class="field" id="rateOverrideField" style="display:none;">
        <label>
          USD/JPY レート（手動上書き）
          <span class="hint">空欄で自動取得レートを使用</span>
        </label>
        <div class="rate-override-row">
          <div class="input-row">
            <input type="number" id="rateOverride" min="1" step="0.01" placeholder="自動取得中…">
            <span class="input-unit">円</span>
          </div>
          <button class="reset-btn" onclick="clearRateOverride()">リセット</button>
        </div>
      </div>

    </div>

    <button class="calc-btn" id="calcBtn" onclick="calculate()">
      ▶&nbsp; ロットを計算する
    </button>
  </div>

  <!-- Result -->
  <div class="section-title">Step 03 &nbsp;計算結果</div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-header-left">
        <div class="label" id="resultPairLabel">USD/JPY &nbsp;›&nbsp; 推奨ロット数</div>
        <div>
          <span class="lot-display" id="lotDisplay">0.00</span>
          <span class="lot-unit">Lot</span>
        </div>
        <div class="lot-units-sub" id="lotUnitsDisplay">= 0 通貨</div>
      </div>
      <div class="risk-badge" id="riskBadgeBox"
           style="background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);color:var(--green)">
        <div class="rb-label">許容損失</div>
        <div class="rb-val" id="riskAmtDisplay">¥0</div>
      </div>
    </div>

  </div>

</div>

<script>
/* ── Currency pair data ── */
const PAIRS = [
  { id:'USDJPY', name:'USD/JPY', desc:'米ドル/円', pip:0.01,  unit:'JPY', contractSize:100000, jpyPair:true,  quote:'JPY', cross:false, rate:154.50 },
  { id:'EURJPY', name:'EUR/JPY', desc:'ユーロ/円',   pip:0.01,  unit:'JPY', contractSize:100000, jpyPair:true,  quote:'JPY', cross:true,  rate:166.20 },
  { id:'GBPJPY', name:'GBP/JPY', desc:'ポンド/円',   pip:0.01,  unit:'JPY', contractSize:100000, jpyPair:true,  quote:'JPY', cross:true,  rate:195.80 },
  { id:'AUDJPY', name:'AUD/JPY', desc:'豪ドル/円',   pip:0.01,  unit:'JPY', contractSize:100000, jpyPair:true,  quote:'JPY', cross:true,  rate:99.40  },
  { id:'EURUSD', name:'EUR/USD', desc:'ユーロ/ドル', pip:0.0001,unit:'USD', contractSize:100000, jpyPair:false, quote:'USD', cross:false, rate:1.0780 },
  { id:'GBPUSD', name:'GBP/USD', desc:'ポンド/ドル', pip:0.0001,unit:'USD', contractSize:100000, jpyPair:false, quote:'USD', cross:false, rate:1.2680 },
  { id:'AUDUSD', name:'AUD/USD', desc:'豪ドル/ドル', pip:0.0001,unit:'USD', contractSize:100000, jpyPair:false, quote:'USD', cross:false, rate:0.6450 },
  { id:'USDCHF', name:'USD/CHF', desc:'ドル/フラン',  pip:0.0001,unit:'CHF', contractSize:100000, jpyPair:false, quote:'CHF', cross:false, rate:0.8980 },
  { id:'NZDJPY', name:'NZD/JPY', desc:'NZドル/円',   pip:0.01,  unit:'JPY', contractSize:100000, jpyPair:true,  quote:'JPY', cross:true,  rate:91.60  },
  { id:'CADJPY', name:'CAD/JPY', desc:'カナダ/円',   pip:0.01,  unit:'JPY', contractSize:100000, jpyPair:true,  quote:'JPY', cross:true,  rate:111.30 },
  { id:'XAUUSD', name:'XAU/USD', desc:'ゴールド',    pip:0.01,  unit:'USD', contractSize:100,    jpyPair:false, quote:'USD', cross:false, rate:2340.0 },
  { id:'BTCUSD', name:'BTC/USD', desc:'ビットコイン', pip:1,     unit:'USD', contractSize:1,      jpyPair:false, quote:'USD', cross:false, rate:68000  },
];

let selectedPair = PAIRS[0];
const USD_JPY_FALLBACK = 154.50;
let USD_JPY_AUTO = USD_JPY_FALLBACK; // from API
let USD_JPY = USD_JPY_FALLBACK;      // effective rate

/* ── Build pair dropdown ── */
const sel = document.getElementById('pairSelect');
PAIRS.forEach(p => {
  const opt = document.createElement('option');
  opt.value = p.id;
  opt.textContent = `${p.name}　${p.desc}`;
  sel.appendChild(opt);
});

// Restore saved pair
const savedPair = localStorage.getItem('fx_pair');
if (savedPair && PAIRS.find(p => p.id === savedPair)) {
  sel.value = savedPair;
  selectedPair = PAIRS.find(p => p.id === savedPair);
}

sel.addEventListener('change', () => {
  selectedPair = PAIRS.find(p => p.id === sel.value);
  localStorage.setItem('fx_pair', sel.value);
  toggleRateField();
  calculate();
});

function toggleRateField() {
  const field = document.getElementById('rateOverrideField');
  field.style.display = selectedPair.jpyPair ? 'none' : 'flex';
  field.style.flexDirection = 'column';
  field.style.gap = '7px';
}

/* ── Restore saved inputs ── */
function restoreInputs() {
  const balance = localStorage.getItem('fx_balance');
  const risk    = localStorage.getItem('fx_risk');
  const sl      = localStorage.getItem('fx_sl');
  if (balance) document.getElementById('balance').value = balance;
  if (risk)    document.getElementById('risk').value    = risk;
  if (sl)      document.getElementById('sl').value      = sl;
}
restoreInputs();

/* ── Save inputs on change ── */
document.getElementById('balance').addEventListener('input', () => {
  localStorage.setItem('fx_balance', document.getElementById('balance').value);
  calculate();
});
document.getElementById('risk').addEventListener('input', () => {
  localStorage.setItem('fx_risk', document.getElementById('risk').value);
  calculate();
});
document.getElementById('sl').addEventListener('input', () => {
  localStorage.setItem('fx_sl', document.getElementById('sl').value);
  calculate();
});

document.getElementById('rateOverride').addEventListener('input', () => {
  const v = parseFloat(document.getElementById('rateOverride').value);
  USD_JPY = (v > 0) ? v : USD_JPY_AUTO;
  calculate();
});

function clearRateOverride() {
  document.getElementById('rateOverride').value = '';
  USD_JPY = USD_JPY_AUTO;
  calculate();
}

/* ── Fetch latest USD/JPY rate from Frankfurter API ── */
async function fetchUsdJpy() {
  try {
    const res = await fetch('https://api.frankfurter.app/latest?from=USD&to=JPY');
    if (!res.ok) throw new Error();
    const data = await res.json();
    const rate = data.rates?.JPY;
    if (!rate) throw new Error();
    USD_JPY_AUTO = rate;
    const override = parseFloat(document.getElementById('rateOverride').value);
    if (!(override > 0)) USD_JPY = rate;
  } catch (e) {
    USD_JPY_AUTO = USD_JPY_FALLBACK;
    const override = parseFloat(document.getElementById('rateOverride').value);
    if (!(override > 0)) USD_JPY = USD_JPY_FALLBACK;
  }
  toggleRateField();
  calculate();
}

/* ── Format helpers ── */
function fmtJPY(v) {
  if (Math.abs(v) >= 1e8) return '¥' + (v/1e8).toFixed(2) + '億';
  if (Math.abs(v) >= 1e4) return '¥' + Math.round(v/1e4) + '万';
  return '¥' + Math.round(v).toLocaleString();
}

function calculate() {
  const balance = parseFloat(document.getElementById('balance').value) || 0;
  const riskPct = parseFloat(document.getElementById('risk').value)    || 0;
  const slPips  = parseFloat(document.getElementById('sl').value)      || 0;
  const p       = selectedPair;

  if (balance <= 0 || riskPct <= 0 || slPips <= 0) return;

  const riskAmt = balance * (riskPct / 100);

  let pipValPerLot;
  if (p.jpyPair) {
    pipValPerLot = p.contractSize * p.pip;
  } else {
    pipValPerLot = p.contractSize * p.pip * USD_JPY;
  }

  const lots        = riskAmt / (slPips * pipValPerLot);
  const lotsRounded = Math.floor(lots * 100) / 100;
  const units       = lotsRounded * p.contractSize;

  const rc = document.getElementById('resultCard');
  rc.classList.remove('show');
  void rc.offsetWidth;
  rc.classList.add('show');

  document.getElementById('resultPairLabel').textContent = `${p.name}  ›  推奨ロット数`;
  document.getElementById('lotDisplay').textContent      = lotsRounded.toFixed(2);
  document.getElementById('lotUnitsDisplay').textContent = `= ${units.toLocaleString()} 通貨`;
  document.getElementById('riskAmtDisplay').textContent  = fmtJPY(riskAmt);
}

// Initial
fetchUsdJpy();

// Service Worker 登録
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.warn('SW registration failed:', err));
  });
}
